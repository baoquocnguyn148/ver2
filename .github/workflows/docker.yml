name: Docker Build

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "requirements.txt"
      - "src/**"
      - "scripts/**"
      - "*.py"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ver2-retail-analytics:latest .
