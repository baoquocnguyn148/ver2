name: Cloud Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * 0"

permissions:
  contents: read

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    env:
      LOCAL_MODE: "false"
      S3_BUCKET: "ver2-retail-analytics"
      RAW_KEY: "raw/DB.xlsx"
      CURATED_PREFIX: "curated/"
      OUTPUT_PREFIX: "outputs/"
      ATHENA_DATABASE: "retail_analytics"
      ATHENA_WORKGROUP: "retail_analytics_workgroup"
      ATHENA_OUTPUT: "s3://ver2-retail-analytics/outputs/athena/"
      WORK_DIR: "/tmp/ver2"
      PYTHONIOENCODING: "utf-8"
      AWS_DEFAULT_REGION: "ap-southeast-2"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run cloud pipeline
        run: python scripts/run_cloud_pipeline.py

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Cloud pipeline failed on $(date -u)"
          echo "Logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
