<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Retail Sales Analytics AWS Workflow Diagram</title>
  <desc id="desc">Workflow diagram for the Retail Sales Analytics AWS data lakehouse, showing GitHub Actions, Docker, Python pipeline, S3 zones, Glue Catalog, Athena, Power BI, Amplify, Terraform, and cost guardrails.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-20%" width="130%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#ea580c"/>
    </marker>
    <style>
      .title { font: 800 32px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 15px Arial, sans-serif; fill: #475569; }
      .group-title { font: 800 14px Arial, sans-serif; letter-spacing: 1px; fill: #0f172a; }
      .box-title { font: 700 17px Arial, sans-serif; fill: #0f172a; }
      .box-text { font: 400 12.5px Arial, sans-serif; fill: #475569; }
      .tag { font: 700 11px Arial, sans-serif; fill: #334155; }
      .group { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 18; filter: url(#shadow); }
      .node { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.6; rx: 14; filter: url(#shadow); }
      .git { fill: #eff6ff; stroke: #60a5fa; }
      .process { fill: #eef2ff; stroke: #818cf8; }
      .s3 { fill: #fff7ed; stroke: #fb923c; }
      .query { fill: #ecfdf5; stroke: #34d399; }
      .present { fill: #fefce8; stroke: #eab308; }
      .guard { fill: #f1f5f9; stroke: #94a3b8; }
      .future { fill: #f8fafc; stroke: #64748b; stroke-dasharray: 7 6; }
      .flow { fill: none; stroke: #2563eb; stroke-width: 3; marker-end: url(#arrow-blue); }
      .flow-soft { fill: none; stroke: #64748b; stroke-width: 2.2; stroke-dasharray: 7 6; marker-end: url(#arrow-blue); }
      .flow-orange { fill: none; stroke: #ea580c; stroke-width: 3; marker-end: url(#arrow-orange); }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="54" y="56" class="title">Retail Sales Analytics - AWS Data Lakehouse Workflow</text>
  <text x="54" y="84" class="subtitle">Free Tier optimized flow: GitHub Actions automation, Python/Docker processing, S3 data lake, Glue metadata, Athena SQL, Power BI outputs, and Amplify portfolio.</text>

  <rect x="42" y="118" width="262" height="472" class="group"/>
  <text x="66" y="152" class="group-title">CI/CD &amp; ORCHESTRATION</text>

  <rect x="68" y="180" width="210" height="82" class="node git"/>
  <text x="92" y="212" class="box-title">GitHub Repository</text>
  <text x="92" y="238" class="box-text">Source code, docs, site,</text>
  <text x="92" y="256" class="box-text">workflows, Terraform.</text>

  <rect x="68" y="312" width="210" height="92" class="node git"/>
  <text x="92" y="344" class="box-title">GitHub Actions</text>
  <text x="92" y="370" class="box-text">Manual or weekly schedule.</text>
  <text x="92" y="388" class="box-text">Runs cloud pipeline.</text>

  <rect x="68" y="454" width="210" height="82" class="node future"/>
  <text x="92" y="486" class="box-title">Terraform IaC</text>
  <text x="92" y="512" class="box-text">S3, Glue, Athena, IAM</text>
  <text x="92" y="530" class="box-text">after manual flow is stable.</text>

  <rect x="342" y="118" width="236" height="472" class="group"/>
  <text x="366" y="152" class="group-title">PROCESSING LAYER</text>

  <rect x="370" y="208" width="180" height="94" class="node process"/>
  <text x="394" y="240" class="box-title">Docker Image</text>
  <text x="394" y="266" class="box-text">Reproducible runtime</text>
  <text x="394" y="284" class="box-text">for local and cloud jobs.</text>

  <rect x="370" y="370" width="180" height="116" class="node process"/>
  <text x="394" y="402" class="box-title">Python Pipeline</text>
  <text x="394" y="428" class="box-text">data_process.py</text>
  <text x="394" y="446" class="box-text">ml_pipeline.py</text>
  <text x="394" y="464" class="box-text">run_cloud_pipeline.py</text>

  <rect x="616" y="118" width="292" height="472" class="group"/>
  <text x="640" y="152" class="group-title">S3 DATA LAKE</text>

  <rect x="646" y="176" width="232" height="76" class="node s3"/>
  <text x="670" y="208" class="box-title">raw/</text>
  <text x="670" y="234" class="box-text">DB.xlsx original source file.</text>

  <rect x="646" y="312" width="232" height="104" class="node s3"/>
  <text x="670" y="344" class="box-title">curated/</text>
  <text x="670" y="370" class="box-text">Parquet fact and dimensions:</text>
  <text x="670" y="388" class="box-text">sales, customer, product,</text>
  <text x="670" y="406" class="box-text">date, geography.</text>

  <rect x="646" y="476" width="232" height="82" class="node s3"/>
  <text x="670" y="508" class="box-title">outputs/</text>
  <text x="670" y="534" class="box-text">Forecast, churn, reports,</text>
  <text x="670" y="552" class="box-text">models, images, Athena logs.</text>

  <rect x="946" y="118" width="292" height="472" class="group"/>
  <text x="970" y="152" class="group-title">QUERY &amp; PRESENTATION</text>

  <rect x="976" y="160" width="232" height="76" class="node query"/>
  <text x="1000" y="186" class="box-title">Glue Data Catalog</text>
  <text x="1000" y="210" class="box-text">External tables over S3</text>
  <text x="1000" y="226" class="box-text">curated Parquet partitions.</text>

  <rect x="976" y="266" width="232" height="96" class="node query"/>
  <text x="1000" y="292" class="box-title">Amazon Athena</text>
  <text x="1000" y="316" class="box-text">SQL views: product, quarter,</text>
  <text x="1000" y="332" class="box-text">loyalty, churn priority.</text>
  <text x="1000" y="348" class="box-text">Workgroup controls output.</text>

  <rect x="976" y="392" width="232" height="72" class="node present"/>
  <text x="1000" y="418" class="box-title">Power BI</text>
  <text x="1000" y="442" class="box-text">Sales, product, customer</text>
  <text x="1000" y="456" class="box-text">dashboards via ODBC.</text>

  <rect x="976" y="494" width="232" height="72" class="node present"/>
  <text x="1000" y="520" class="box-title">Amplify Portfolio</text>
  <text x="1000" y="544" class="box-text">Public site with dashboard</text>
  <text x="1000" y="558" class="box-text">images and ML results.</text>

  <rect x="340" y="622" width="212" height="64" class="node guard"/>
  <text x="364" y="650" class="box-title">Cost Guardrails</text>
  <text x="364" y="674" class="box-text">Budget, Parquet scans, short logs.</text>

  <rect x="616" y="622" width="314" height="64" class="node future"/>
  <text x="640" y="650" class="box-title">Advanced optional</text>
  <text x="640" y="674" class="box-text">EventBridge -> Step Functions -> Lambda.</text>

  <path class="flow" d="M173 262 L173 312"/>
  <path class="flow" d="M278 358 C310 358 326 255 370 255"/>
  <path class="flow-soft" d="M173 404 L173 454"/>
  <path class="flow" d="M460 302 L460 370"/>
  <path class="flow" d="M550 428 C590 428 604 214 646 214"/>
  <path class="flow" d="M646 214 C606 214 594 364 646 364"/>
  <path class="flow-orange" d="M550 428 C590 428 604 520 646 520"/>
  
  <path class="flow" d="M878 364 C914 364 930 198 976 198"/>
  <path class="flow-orange" d="M878 520 C924 520 932 530 976 530"/>
  
  <path class="flow" d="M1092 236 L1092 266"/>
  <path class="flow" d="M1092 362 L1092 392"/>
  <path class="flow-soft" d="M1092 464 L1092 494"/>

  <rect x="54" y="622" width="220" height="64" rx="14" fill="#e0f2fe" stroke="#38bdf8" stroke-width="1.4"/>
  <text x="78" y="650" class="box-title">Validated AWS</text>
  <text x="78" y="674" class="box-text">ap-southeast-2 | 84,436 fact rows.</text>
</svg>
